<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="HeyVox lockup">
  <defs>
    <linearGradient id="gl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="bgl" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#18181d"/>
      <stop offset="100%" stop-color="#0a0a0b"/>
    </linearGradient>
    <linearGradient id="glw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Icon (160x160 squircle on the left) -->
  <g transform="translate(20,20)">
    <rect x="0" y="0" width="160" height="160" rx="36" ry="36" fill="url(#bgl)"/>
    <rect x="0.5" y="0.5" width="159" height="159" rx="35.5" ry="35.5" fill="none" stroke="#242430" stroke-width="1"/>

    <!-- Speech bubble (scaled to 160 viewBox: original 256→160, scale 0.625) -->
    <g transform="scale(0.625)">
      <path d="M 64 56
               h 128
               a 28 28 0 0 1 28 28
               v 80
               a 28 28 0 0 1 -28 28
               h -76
               l -24 24
               l 6  -24
               h -34
               a 28 28 0 0 1 -28 -28
               v -80
               a 28 28 0 0 1  28 -28
               z"
            fill="none" stroke="url(#gl)" stroke-width="10" stroke-linejoin="round"/>
      <path d="M 92 100 L 134 124 L 92 148"
            fill="none" stroke="url(#gl)"
            stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 172 68 L 176 90 L 198 94 L 176 98 L 172 120 L 168 98 L 146 94 L 168 90 Z"
            fill="url(#gl)"/>
      <path d="M 204 65 L 205.5 70.5 L 211 72 L 205.5 73.5 L 204 79 L 202.5 73.5 L 197 72 L 202.5 70.5 Z"
            fill="url(#gl)"/>
    </g>
  </g>

  <!-- Wordmark to the right -->
  <text x="208" y="125"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="84"
        font-weight="700"
        letter-spacing="-2.8"
        fill="url(#glw)">HeyVox</text>
</svg>
