<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="HeyVox — bubble with twin AI sparkles">
  <defs>
    <linearGradient id="gB4t" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="bgB4t" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#18181d"/>
      <stop offset="100%" stop-color="#0a0a0b"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="url(#bgB4t)"/>
  <rect x="0.5" y="0.5" width="255" height="255" rx="55.5" ry="55.5" fill="none" stroke="#242430" stroke-width="1"/>

  <!-- Speech bubble -->
  <path d="M 64 56
           h 128
           a 28 28 0 0 1 28 28
           v 80
           a 28 28 0 0 1 -28 28
           h -76
           l -24 24
           l 6  -24
           h -34
           a 28 28 0 0 1 -28 -28
           v -80
           a 28 28 0 0 1  28 -28
           z"
        fill="none" stroke="url(#gB4t)" stroke-width="10" stroke-linejoin="round"/>

  <!-- '>' caret (same as B4a) -->
  <path d="M 92 100 L 134 124 L 92 148"
        fill="none" stroke="url(#gB4t)"
        stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Main sparkle — sharp, spike 26 / inner 4 / centre (172, 94) -->
  <path d="M 172 68
           L 176 90
           L 198 94
           L 176 98
           L 172 120
           L 168 98
           L 146 94
           L 168 90 Z"
        fill="url(#gB4t)"/>

  <!-- Small companion sparkle — top-right, spike 7 / inner 1.5 / centre (204, 72) -->
  <path d="M 204 65
           L 205.5 70.5
           L 211 72
           L 205.5 73.5
           L 204 79
           L 202.5 73.5
           L 197 72
           L 202.5 70.5 Z"
        fill="url(#gB4t)"/>
</svg>
