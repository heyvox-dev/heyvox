<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hush</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #1a1a1a;
      --bg-card: #242424;
      --bg-hover: #2e2e2e;
      --border: #333;
      --text-primary: #f0f0f0;
      --text-secondary: #999;
      --text-muted: #666;
      --accent-pause: #E53E3E;
      --accent-playing: #48BB78;
      --accent-idle: #718096;
      --btn-bg: #2d2d2d;
      --btn-hover: #3a3a3a;
      --btn-active-bg: #48BB78;
      --btn-active-hover: #38A169;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      width: 280px;
      min-height: 120px;
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      background: linear-gradient(135deg, #E53E3E 0%, #C53030 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 8px;
      height: 10px;
      border-left: 8px solid white;
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      margin-left: 2px;
    }

    /* Paused state overrides logo to show pause bars */
    .logo.is-paused .logo-icon {
      border: none;
      width: 8px;
      height: 10px;
      margin-left: 0;
      background:
        linear-gradient(white, white) 0 0 / 3px 10px no-repeat,
        linear-gradient(white, white) 5px 0 / 3px 10px no-repeat;
    }

    .brand-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text-primary);
    }

    /* ── State pill ──────────────────────────────────────────── */
    .state-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .state-pill::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .state-pill[data-state="paused"] {
      background: rgba(229, 62, 62, 0.15);
      color: var(--accent-pause);
    }

    .state-pill[data-state="playing"] {
      background: rgba(72, 187, 120, 0.15);
      color: var(--accent-playing);
    }

    .state-pill[data-state="idle"],
    .state-pill[data-state=""] {
      background: rgba(113, 128, 150, 0.15);
      color: var(--accent-idle);
    }

    /* ── Body ────────────────────────────────────────────────── */
    .body {
      padding: 12px 16px;
    }

    /* ── Paused tab list ─────────────────────────────────────── */
    .tabs-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .tab-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 160px;
      overflow-y: auto;
      margin-bottom: 12px;
    }

    .tab-list::-webkit-scrollbar {
      width: 4px;
    }

    .tab-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .tab-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .tab-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      background: var(--bg-card);
      border-radius: 6px;
      border: 1px solid var(--border);
      min-width: 0;
    }

    .tab-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      opacity: 0.5;
    }

    .tab-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-secondary);
      font-size: 12px;
    }

    /* ── Empty state ─────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 12px 0 4px;
      color: var(--text-muted);
      font-size: 12px;
    }

    /* ── Resume button ───────────────────────────────────────── */
    .btn-resume {
      width: 100%;
      padding: 9px 16px;
      background: var(--btn-active-bg);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .btn-resume:hover {
      background: var(--btn-active-hover);
    }

    .btn-resume:active {
      transform: scale(0.98);
    }

    .btn-resume:disabled {
      background: var(--btn-bg);
      color: var(--text-muted);
      cursor: not-allowed;
      transform: none;
    }

    /* ── Error ───────────────────────────────────────────────── */
    .error-msg {
      text-align: center;
      color: var(--accent-pause);
      font-size: 12px;
      padding: 8px 0;
    }

    /* ── Loading ─────────────────────────────────────────────── */
    .loading {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      padding: 16px 0;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-brand">
      <div class="logo" id="logo">
        <div class="logo-icon"></div>
      </div>
      <span class="brand-name">Hush</span>
    </div>
    <span class="state-pill" id="statePill" data-state="">idle</span>
  </header>

  <main class="body" id="mainBody">
    <p class="loading" id="loadingMsg">Loading...</p>
  </main>

  <script src="popup.js"></script>
</body>
</html>
